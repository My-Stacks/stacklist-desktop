name: Release

# Release-on-merge. A push to main releases ONLY when package.json carries a
# version that isn't published yet — so the version bump rides inside the normal
# PR and merging it is the single act that cuts the release. The `check` job is
# the idempotency gate: pushes that don't bump the version (docs, CI, etc.) are
# detected as already-released and skip the build entirely.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force:
        description: 'Force a release even if this version is already published'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
      version: ${{ steps.decide.outputs.version }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Decide whether to release
        id: decide
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force }}
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          if [ "${FORCE:-false}" = "true" ]; then
            echo "Force requested — will (re)build ${TAG}."
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists — this push didn't bump the version. Skipping."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "No release for ${TAG} yet — building & publishing."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

  build-mac:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & sign & notarize DMG
        env:
          # Code signing — export Developer ID Application cert as .p12,
          # then: base64 -i cert.p12 | pbcopy  →  paste as CSC_LINK secret
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # Publish to GitHub Releases (electron-builder creates the vX.Y.Z release + tag)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Stacklist-mac
          path: dist/*.dmg
          if-no-files-found: error

  build-win:
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish -- --win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Stacklist-win
          path: dist/*.exe
          if-no-files-found: error

  # After both platform builds publish the release, point the marketing site's
  # download links at the new version. Opens a PR on My-Stacks/stacklist-website
  # and pings Slack.
  sync-website:
    needs: [check, build-mac, build-win]
    if: needs.check.outputs.release == 'true'
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.check.outputs.tag }}
    steps:
      - name: Guard — require WEBSITE_REPO_TOKEN
        id: guard
        env:
          WEBSITE_REPO_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: |
          if [ -z "$WEBSITE_REPO_TOKEN" ]; then
            echo "WEBSITE_REPO_TOKEN not set — skipping website download-link sync."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout stacklist-website
        if: steps.guard.outputs.skip == 'false'
        uses: actions/checkout@v4.2.2
        with:
          repository: My-Stacks/stacklist-website
          token: ${{ secrets.WEBSITE_REPO_TOKEN }}
          ref: main

      - name: Bump DESKTOP_VERSION and open PR
        if: steps.guard.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.WEBSITE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          FILE="src/config/apps.ts"
          CURRENT=$(grep -oE "const DESKTOP_VERSION = '[^']+'" "$FILE" | grep -oE "v[0-9]+\.[0-9]+\.[0-9]+" || true)
          echo "Site currently at: ${CURRENT:-unknown} — new tag: ${TAG}"
          if [ "$CURRENT" = "$TAG" ]; then
            echo "Already pointing at ${TAG}; nothing to do."
            exit 0
          fi
          BRANCH="chore/desktop-app-${TAG//./-}"
          EXISTING=$(gh pr list --repo My-Stacks/stacklist-website --head "$BRANCH" --state open --json url --jq '.[0].url // empty')
          if [ -n "$EXISTING" ]; then
            echo "PR already open: $EXISTING"
            echo "PR_URL=$EXISTING" >> "$GITHUB_ENV"
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git push origin --delete "$BRANCH" 2>/dev/null || true
          git checkout -b "$BRANCH"
          sed -i "s/const DESKTOP_VERSION = '[^']*';/const DESKTOP_VERSION = '${TAG}';/" "$FILE"
          git add "$FILE"
          git commit -m "chore: point downloads at desktop ${TAG}"
          git push -u origin "$BRANCH"
          PR_URL=$(gh pr create \
            --repo My-Stacks/stacklist-website \
            --base main \
            --head "$BRANCH" \
            --title "chore: desktop downloads → ${TAG}" \
            --body "Automated by the stacklist-desktop release workflow. Points the /apps Mac + Windows download links and sublabels at \`${TAG}\`. Release: https://github.com/My-Stacks/stacklist-desktop/releases/tag/${TAG}")
          echo "Opened: $PR_URL"
          echo "PR_URL=$PR_URL" >> "$GITHUB_ENV"
          echo "### Downloads PR opened: $PR_URL" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack
        if: steps.guard.outputs.skip == 'false' && env.PR_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PR_URL: ${{ env.PR_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification."
            exit 0
          fi
          curl -sf -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rocket: Stacklist desktop *${TAG}* is published. Download-link PR opened on stacklist-website: ${PR_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
