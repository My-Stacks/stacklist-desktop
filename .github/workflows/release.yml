name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & sign & notarize DMG
        env:
          # Code signing — export Developer ID Application cert as .p12,
          # then: base64 -i cert.p12 | pbcopy  →  paste as CSC_LINK secret
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # Notarization
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # Publish to GitHub Releases
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "push" || "${{ inputs.publish }}" == "true" ]]; then
            npm run publish
          else
            npm run build:mac
          fi

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Stacklist-mac
          path: dist/*.dmg
          if-no-files-found: error

  build-win:
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ("${{ github.event_name }}" -eq "push" -or "${{ inputs.publish }}" -eq "true") {
            npm run publish -- --win
          } else {
            npm run build:win
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: Stacklist-win
          path: dist/*.exe
          if-no-files-found: error
