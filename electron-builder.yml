appId: app.stacklist.desktop
productName: Stacklist
copyright: Copyright © 2025 Stacklist

directories:
  buildResources: build
  output: dist

files:
  - src/**/*
  - package.json
  # Loaded at runtime for the tray (and dev dock) icon — buildResources are
  # build-time only, so this must be listed explicitly to ship in the app.
  - build/icon.png

# Registers stacklist:// in Info.plist (CFBundleURLTypes) — without this,
# setAsDefaultProtocolClient is a no-op on macOS and deep links never reach
# the packaged app. Windows registers via the registry at runtime.
protocols:
  - name: Stacklist
    schemes:
      - stacklist

mac:
  # macOS-only: dock-icon drag-and-drop requires declared document types
  # (CFBundleDocumentTypes). The open-file event this feeds is mac-only, so
  # don't register these on Windows where they'd be dead registry entries.
  fileAssociations:
    - ext: pdf
      name: PDF Document
      mimeType: application/pdf
      role: Viewer
    - ext: md
      name: Markdown File
      mimeType: text/markdown
      role: Viewer
    - ext: txt
      name: Text File
      mimeType: text/plain
      role: Viewer
  target:
    - target: dmg
    - target: zip
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.icns
  notarize: true

dmg:
  # background: build/dmg-background.png
  iconSize: 80
  window:
    x: 400
    y: 100
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
    - target: deb
  category: Utility

publish:
  provider: github
  owner: My-Stacks
  repo: stacklist-desktop
  releaseType: release
