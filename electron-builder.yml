appId: app.stacklist.desktop
productName: Stacklist
copyright: Copyright © 2025 Stacklist

directories:
  buildResources: build
  output: dist

files:
  - src/**/*
  - package.json

mac:
  target:
    - target: dmg
    - target: zip
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.icns
  notarize:
    teamId: ${env.APPLE_TEAM_ID}

dmg:
  # background: build/dmg-background.png
  iconSize: 80
  window:
    x: 400
    y: 100
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
    - target: deb
  category: Utility

publish:
  provider: github
  owner: stacklist
  repo: stacklist-desktop
