appId: app.stacklist.desktop
productName: Stacklist
copyright: Copyright © 2025 Stacklist

directories:
  buildResources: build
  output: dist

files:
  - src/**/*
  - package.json

fileAssociations:
  - ext: pdf
    name: PDF Document
    mimeType: application/pdf
    role: Viewer
    utis:
      - com.adobe.pdf
  - ext: md
    name: Markdown File
    mimeType: text/markdown
    role: Viewer
    utis:
      - net.daringfireball.markdown
  - ext: txt
    name: Text File
    mimeType: text/plain
    role: Viewer
    utis:
      - public.plain-text

mac:
  target:
    - target: dmg
    - target: zip
  category: public.app-category.productivity
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.icns
  notarize: true

dmg:
  # background: build/dmg-background.png
  iconSize: 80
  window:
    x: 400
    y: 100
    width: 540
    height: 380
  contents:
    - x: 130
      y: 220
      type: file
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
  icon: build/icon.ico

linux:
  target:
    - target: AppImage
    - target: deb
  category: Utility

publish:
  provider: github
  owner: My-Stacks
  repo: stacklist-desktop
  releaseType: release
